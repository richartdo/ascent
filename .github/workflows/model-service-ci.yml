name: Model Service CI

on:
  pull_request:
    paths:
      - "model-service/**"
      - ".github/workflows/model-service-ci.yml"
  push:
    branches: [main, uat]
    paths:
      - "model-service/**"
      - ".github/workflows/model-service-ci.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: model-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: model-service/requirements.txt
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run offline tests
        run: python -m pytest
      - name: Compile application and tests
        run: python -m compileall app tests
